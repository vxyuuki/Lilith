<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firefly | The Entropy of Light</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Public+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-barba="wrapper">
  
  <canvas id="webgl-bg"></canvas>

  <div class="cursor">
    <span class="cursor-text"></span>
  </div>

  <div class="sound-toggle magnetic">
    <span class="sound-text">SOUND OFF</span>
    <div class="sound-bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <main class="smooth-scroll" data-barba="container" data-barba-namespace="firefly">
    <nav class="cyber-nav">
      <a href="/index.html" class="nav-link">ROSTER</a>
      <a href="/firefly.html" class="nav-link" style="color: var(--accent);">FIREFLY</a>
      <a href="/about.html" class="nav-link">ABOUT</a>
    </nav>
    <style>
      :root { 
        --accent: #00ffa6; 
        --bg-color: #050a08;
      }
      /* Custom Firefly Layout */
      .firefly-hero {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .firefly-hero-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover;
        opacity: 0.4;
        filter: blur(5px);
        transform: scale(1.1);
      }
      .firefly-title-wrapper {
        position: relative;
        z-index: 2;
        text-align: center;
      }
      .firefly-title {
        font-size: 8vw;
        font-family: var(--font-sans);
        font-weight: 800;
        text-transform: uppercase;
        color: #fff;
        letter-spacing: 0.2em;
        mix-blend-mode: overlay;
      }
      .firefly-quote {
        font-family: var(--font-serif);
        font-size: 2rem;
        font-style: italic;
        color: var(--accent);
        margin-top: -1rem;
      }
      
      /* Floating Gallery */
      .firefly-gallery {
        padding: 15vh 5vw;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 20px;
        position: relative;
      }
      .ff-img-wrap {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
      }
      .ff-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 1s ease;
      }
      .ff-img-wrap:hover img {
        transform: scale(1.05);
      }
      .ff-grid-1 { grid-column: 2 / 6; grid-row: 1; aspect-ratio: 4/5; margin-top: 50px; }
      .ff-grid-2 { grid-column: 7 / 12; grid-row: 1; aspect-ratio: 16/9; }
      .ff-grid-3 { grid-column: 1 / 8; grid-row: 2; aspect-ratio: 16/9; margin-top: -50px; z-index: 2; }
      .ff-grid-4 { grid-column: 9 / 12; grid-row: 2; aspect-ratio: 3/4; margin-top: 100px; }
      .ff-grid-5 { grid-column: 4 / 10; grid-row: 3; aspect-ratio: 16/9; margin-top: 50px; }

      /* Firefly Orbs */
      .orb-container {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none;
        z-index: 999;
      }
      .orb {
        position: absolute;
        width: 6px; height: 6px;
        background-color: var(--accent);
        border-radius: 50%;
        box-shadow: 0 0 15px 5px var(--accent);
        opacity: 0;
      }
      
      .firefly-story {
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0 20vw;
      }
      .ff-story-text {
        font-size: 2.5rem;
        line-height: 1.5;
        font-family: var(--font-serif);
        margin-bottom: 2rem;
      }
    </style>
  
      <section class="firefly-hero">
        <img src="/Waifu_List/Firefly/119768376_p0.png" alt="Firefly BG" class="firefly-hero-bg ff-parallax-bg" />
        <div class="firefly-title-wrapper">
          <h1 class="firefly-title ff-reveal-title">FIREFLY</h1>
          <p class="firefly-quote ff-reveal-quote">"I will set the seas ablaze."</p>
        </div>
      </section>

      <section class="firefly-story">
        <p class="ff-story-text ff-fade-up">"Entropy Loss Syndrome... My existence is a fleeting ember."</p>
        <p class="ff-story-text ff-fade-up" style="color: var(--accent);">"But even so, I choose to fly."</p>
      </section>

      <section class="firefly-gallery">
        <div class="ff-img-wrap ff-grid-1 ff-fade-up"><img src="/Waifu_List/Firefly/120034297_p0.png" alt="Mem 1"></div>
        <div class="ff-img-wrap ff-grid-2 ff-fade-up" data-delay="0.2"><img src="/Waifu_List/Firefly/140222217_p0.jpg" alt="Mem 2"></div>
        <div class="ff-img-wrap ff-grid-3 ff-fade-up"><img src="/Waifu_List/Firefly/22123abcbf91f2b4d220fb4d612f08e4.jpg" alt="Mem 3"></div>
        <div class="ff-img-wrap ff-grid-4 ff-fade-up" data-delay="0.2"><img src="/Waifu_List/Firefly/33f95b8c8308888022664e91b327896b.jpg" alt="Mem 4"></div>
        <div class="ff-img-wrap ff-grid-5 ff-fade-up"><img src="/Waifu_List/Firefly/501b67d31caa29863ab494e69bf1a9db.jpg" alt="Mem 5"></div>
      </section>

      <!-- Orb Container for JS injection -->
      <div class="orb-container"></div>
  </main>

  <div class="page-transition-layer">
    <div class="transition-glitch-text glitch-core flicker-text extreme-glitch" style="position: relative;" data-text="SYSTEM ERROR">SYSTEM ERROR</div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
