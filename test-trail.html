<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trail Test</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a2e;
      color: white;
      font-family: sans-serif;
    }
    .info {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      pointer-events: none;
      z-index: 10;
    }
    .image-trail-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
    }
    .trail-img {
      position: absolute;
      object-fit: cover;
      border-radius: 8px;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="info">Gerakkan kursor Anda di sini...</div>
  <div class="image-trail-container"></div>
  <script type="module" src="./test-trail.js"></script>
</body>
</html>
